name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────
# Code-signing secrets (optional — the workflow builds unsigned if absent):
#
#   WINDOWS:
#     WINDOWS_CSC_LINK           base64-encoded .pfx file contents
#     WINDOWS_CSC_KEY_PASSWORD   password for the .pfx file
#
#   MACOS:
#     MAC_CSC_LINK               base64-encoded .p12 file contents
#                                (exported from Keychain with a password)
#     MAC_CSC_KEY_PASSWORD       password for the .p12 file
#     APPLE_ID                   Apple ID email
#     APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
#     APPLE_TEAM_ID              10-char Team ID (from the Apple Developer portal)
#
# Add them at: Settings → Secrets and variables → Actions → New repository secret
# Once any of the above exist, the corresponding platform will be signed automatically.
# ──────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_build_from_source: false

      - name: Build app (vite)
        run: npm run build

      # ── Windows: package with optional signing ─────────────────────
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If WINDOWS_CSC_LINK is set, electron-builder will sign.
          # If not, CSC_LINK is empty and signing is skipped gracefully.
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── macOS: package with optional signing + notarization ────────
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Auto-discover identity in keychain only if a CSC_LINK was provided
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}

      # ── Linux: no signing required ─────────────────────────────────
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: npx electron-builder --linux --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devtoolkit-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest*.yml" \) -exec cp {} release/ \;
          ls -lh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*

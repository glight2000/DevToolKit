appId: com.devtoolkit.app
productName: DevToolkit
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - '!**/*.map'
# Rebuild native modules (better-sqlite3) against Electron's Node ABI.
npmRebuild: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  # Signing is driven by env vars (CSC_LINK / CSC_KEY_PASSWORD) set by the
  # GitHub Actions workflow. If they're absent the build stays unsigned.
  signAndEditExecutable: true

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DevToolkit

mac:
  target:
    - target: dmg
      # macos-latest runner is Apple Silicon (arm64). Building x64 from arm64
      # requires cross-compiling native modules (better-sqlite3) which is
      # fragile on CI. Ship arm64 only for now — add x64 via a separate
      # runner later when needed.
      arch:
        - arm64
  icon: resources/icon.png
  category: public.app-category.developer-tools
  # Disable any implicit signing attempts when no cert is provided.
  identity: null
  # hardenedRuntime + notarize are opt-in; leave them off for unsigned builds.
  # The CI workflow flips them on via env vars only when real certs exist.
  gatekeeperAssess: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Development
  synopsis: Pluggable multi-tool desktop app for developers

# Publish is driven by the GitHub Actions workflow using softprops/action-gh-release,
# so electron-builder itself uses --publish never. No publish section needed here.
